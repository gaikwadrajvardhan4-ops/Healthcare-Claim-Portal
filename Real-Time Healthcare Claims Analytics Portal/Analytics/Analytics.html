<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthcare Claims Analytics Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>


<div class="main">

    <header>
        <h1>Real-Time Healthcare Claims Analytics</h1>
    </header>

    <div class="cards">

        <div class="card">
            <h3>Total Claims</h3>
            <p>12,450</p>
        </div>

        <div class="card">
            <h3>Approved</h3>
            <p>8,950</p>
        </div>

        <div class="card">
            <h3>Pending</h3>
            <p>2,300</p>
        </div>

        <div class="card">
            <h3>Rejected</h3>
            <p>1,200</p>
        </div>

    </div>

    <div class="ai-box">
        <h2>AI Fraud Detection Score</h2>
        <div class="score">92%</div>
        <p>Low Fraud Risk Detected</p>
    </div>

    <div class="charts">

        <div class="chart-box">
            <canvas id="claimsChart"></canvas>
        </div>

        <div class="chart-box">
            <canvas id="trendChart"></canvas>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
