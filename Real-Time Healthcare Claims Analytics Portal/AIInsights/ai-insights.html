<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Insights & Anomaly Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🏥 AI Insights & Anomaly Detection</h1>

        <p class="subtitle">
            Analyze healthcare claims and detect anomalies
        </p>

        <div class="card">

            <label>Claim Amount (₹)</label>

            <input type="number"
                   id="claimAmount"
                   placeholder="Enter claim amount">

            <button onclick="detectAnomaly()">
                Analyze Claim
            </button>

            <h3 id="result"></h3>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
